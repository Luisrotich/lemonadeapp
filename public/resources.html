<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource view · discover</title>
  <!-- Font Awesome for icons (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* main container – exactly with data-view attribute */
    [data-view="resource-view"] {
      max-width: 1280px;
      width: 100%;
    }

    /* header & filter section */
    .rv-header {
      margin-bottom: 2.5rem;
    }

    .rv-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .rv-header h1 i {
      color: #ff8000;
      font-size: 2rem;
    }

    .rv-description {
      color: #475569;
      margin-top: 0.3rem;
      font-size: 1.1rem;
      border-left: 4px solid #94a3b8;
      padding-left: 1rem;
    }

    /* filter chips */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 1.8rem 0 2rem 0;
    }

    .filter-btn {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 0.6rem 1.4rem;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn i {
      font-size: 0.9rem;
      color: #64748b;
    }

    .filter-btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
    }

    .filter-btn.active i {
      color: white;
    }

    /* resource grid – cards */
    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
      margin-top: 1.2rem;
    }

    /* card styling */
    .resource-card {
      background: white;
      border-radius: 24px;
      padding: 1.5rem 1.3rem 1.5rem 1.3rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04), 0 4px 8px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
      border: 1px solid rgba(203, 213, 225, 0.3);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
      cursor: default;
      opacity: 1;
      transform: scale(1);
    }

    .resource-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 35px -8px rgba(0, 80, 150, 0.15);
      border-color: #b9d4f0;
    }

    /* card icon area */
    .card-icon {
      background: #eef2ff;
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.2rem;
      color: #2563eb;
      font-size: 1.8rem;
    }

    .card-category {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #3b82f6;
      background: #dbeafe;
      display: inline-block;
      padding: 0.25rem 1rem;
      border-radius: 30px;
      margin-bottom: 0.8rem;
      align-self: flex-start;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.3;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1.3rem;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.8rem 0 1.2rem 0;
    }

    .tag {
      background: #f1f5f9;
      color: #334155;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .card-link {
      text-decoration: none;
      font-weight: 600;
      color: #2563eb;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #e9eef3;
      padding-top: 1rem;
      margin-top: 0.2rem;
      transition: gap 0.2s;
    }

    .card-link i {
      font-size: 0.8rem;
    }

    .card-link:hover {
      gap: 12px;
      color: #1d4ed8;
    }

    /* filter animation / hidden state */
    .resource-card.hidden {
      display: none;
    }

    /* footer / count */
    .resource-footer {
      margin-top: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 0.95rem;
      border-top: 1px dashed #cbd5e1;
      padding-top: 1.8rem;
    }

    .count-badge {
      background: #e2e8f0;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-weight: 500;
    }

    /* responsive tiny touch */
    @media (max-width: 500px) {
      body { padding: 1rem; }
      .filter-bar { gap: 0.5rem; }
      .filter-btn { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
  <!-- main container with required data-view attribute -->
  <div data-view="resource-view">
    
    <!-- header & title -->
    <div class="rv-header">
      <h1>
        <i class="fas fa-layer-group"></i> 
        Resource library
      </h1>
      <div class="rv-description">
        <i class="fas fa-compass" style="margin-right: 6px;"></i> 
        Curated tools, articles & videos for modern makers
      </div>
    </div>

    <!-- filter chips (category) -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all"><i class="fas fa-grid-2"></i> All</button>
      <button class="filter-btn" data-filter="article"><i class="fas fa-newspaper"></i> Articles</button>
      <button class="filter-btn" data-filter="video"><i class="fas fa-video"></i> Videos</button>
      <button class="filter-btn" data-filter="tool"><i class="fas fa-wrench"></i> Tools</button>
    </div>

    <!-- dynamic resource grid -->
    <div class="resource-grid" id="resourceGrid">
      <!-- cards will be populated via JavaScript (or static with data-category) -->
    </div>

    <!-- footer with live count -->
    <div class="resource-footer">
      <span><i class="far fa-bookmark"></i> discover · handpicked</span>
      <span class="count-badge" id="resourceCount">8 items</span>
    </div>
  </div>

  <script>
    (function() {
      // ---------- RESOURCE DATA ----------
      const resources = [
       {
  title: "About us",
  desc: "Learn about our mission, team, and the story behind our company.",
  category: "company",
  icon: "fa-solid fa-building",
  tags: ["company", "mission", "team"],
  link: "about.html",
  linkLabel: "about us"
},
{
  title: "Help center",
  desc: "FAQs, tutorials, and guides to help you make the most of our services.",
  category: "support",
  icon: "fa-solid fa-circle-question",
  tags: ["support", "FAQ", "guides"],
  link: "help.html",
  linkLabel: "get help"
},
{
  title: "Blog",
  desc: "Latest updates, industry insights, and stories from our team.",
  category: "content",
  icon: "fa-solid fa-blog",
  tags: ["articles", "news", "updates"],
  link: "blog.html",
  linkLabel: "read blog"
},
{
  title: "Contact",
  desc: "Get in touch with our team for support, partnerships, or general inquiries.",
  category: "contact",
  icon: "fa-solid fa-envelope",
  tags: ["email", "support", "inquiries"],
  link: "contact.html",
  linkLabel: "contact us"
},
{
  title: "Careers",
  desc: "Join our team – view open positions and learn about working with us.",
  category: "careers",
  icon: "fa-solid fa-briefcase",
  tags: ["jobs", "hiring", "culture"],
  link: "careers.html",
  linkLabel: "view openings"
},

  {
    title: "X (Twitter)",
    desc: "Follow us for updates, tips, and community highlights.",
    category: "social",
    icon: "fa-brands fa-x-twitter",
    tags: ["social", "X", "updates"],
    link: "https://twitter.com/company",
    linkLabel: "follow"
  },
  {
    title: "Instagram",
    desc: "Visual stories, behind the scenes, and daily moments.",
    category: "social",
    icon: "fa-brands fa-instagram",
    tags: ["social", "photos", "stories"],
    link: "https://instagram.com/company",
    linkLabel: "follow"
  },
  {
    title: "TikTok",
    desc: "Short videos, trends, and creative content from our team.",
    category: "social",
    icon: "fa-brands fa-tiktok",
    tags: ["social", "videos", "trending"],
    link: "https://tiktok.com/@company",
    linkLabel: "follow"
  },
  {
    title: "Facebook",
    desc: "Join our community for events, announcements, and discussions.",
    category: "social",
    icon: "fa-brands fa-facebook",
    tags: ["social", "community", "events"],
    link: "https://facebook.com/company",
    linkLabel: "like"
  }

      ];

      // ---------- RENDER CARDS ----------
      const grid = document.getElementById('resourceGrid');
      const countSpan = document.getElementById('resourceCount');

      function renderCards(filter = 'all') {
        let html = '';
        let visibleCount = 0;

        resources.forEach((res, index) => {
          const category = res.category;
          // prepare icon class (fallback)
          const iconClass = res.icon || 'fa-solid fa-file-lines';
          // generate tags html
          const tagsHtml = res.tags.map(t => `<span class="tag">${t}</span>`).join('');
          
          // card html (includes data-category attribute for filtering)
          html += `
            <div class="resource-card" data-category="${category}" data-index="${index}">
              <div class="card-icon"><i class="${iconClass}"></i></div>
              <span class="card-category"><i class="fa-regular fa-folder-open" style="margin-right:4px;"></i>${category}</span>
              <div class="card-title">${res.title}</div>
              <div class="card-desc">${res.desc}</div>
              <div class="card-tags">${tagsHtml}</div>
              <a href="${res.link}" class="card-link">${res.linkLabel} <i class="fas fa-arrow-right"></i></a>
            </div>
          `;
        });

        grid.innerHTML = html;

        // apply filter if needed (hide based on current filter)
        const cards = document.querySelectorAll('.resource-card');
        cards.forEach(card => {
          const cat = card.dataset.category;
          if (filter === 'all' || cat === filter) {
            card.classList.remove('hidden');
            visibleCount++;
          } else {
            card.classList.add('hidden');
          }
        });

        // update count
        countSpan.innerText = visibleCount + (visibleCount === 1 ? ' item' : ' items');
        return visibleCount;
      }

      // initial render (filter = all)
      renderCards('all');

      // ---------- FILTER BUTTON LOGIC ----------
      const filterBar = document.getElementById('filterBar');
      const filterBtns = filterBar.querySelectorAll('.filter-btn');

      function setActiveFilter(selectedFilter) {
        filterBtns.forEach(btn => {
          const filterValue = btn.dataset.filter;
          if (filterValue === selectedFilter) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }

      // filter click handler
      filterBar.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;

        const filterValue = btn.dataset.filter;   // 'all', 'article', 'video', 'tool'
        if (!filterValue) return;

        // update active class on buttons
        setActiveFilter(filterValue);

        // get all cards
        const cards = document.querySelectorAll('.resource-card');
        let visibleCount = 0;

        cards.forEach(card => {
          const cat = card.dataset.category;
          if (filterValue === 'all' || cat === filterValue) {
            card.classList.remove('hidden');
            visibleCount++;
          } else {
            card.classList.add('hidden');
          }
        });

        // update footer count
        countSpan.innerText = visibleCount + (visibleCount === 1 ? ' item' : ' items');
      });

      // optional: count update after render already ok. 
      // but we also keep sync for edge cases (already fine)
      // additionally, we set data-view attribute on outer div (already present)
    })();
  </script>

  <!-- small note to ensure data-view is on the right element (already done) -->
  <!-- this page uses only static resources, fully responsive and interactive -->
</body>
</html>
